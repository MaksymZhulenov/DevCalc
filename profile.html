<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile - DevCalc</title>
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/x-icon" href="images/favicon.png" />
</head>

<body class="d-flex flex-column min-vh-100">
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
            <div class="container">
                <a class="navbar-brand" href="index.html">DevCalc</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link" href="index.html">Calculator</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    </ul>
                    <div class="d-flex align-items-center gap-3">
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="flex-grow-1 d-flex align-items-center py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <h3 class="mb-4 fw-bold text-center">User Profile</h3>
                    <div class="card shadow-sm border-0">
                        <div class="card-body p-4 p-md-5">

                            <div class="row">
                                <div
                                    class="col-md-5 d-flex flex-column align-items-center justify-content-center border-end mb-4 mb-md-0 py-3">
                                    <img id="profileAvatar" src="images/avatar.png" alt="User Avatar"
                                        class="rounded-circle mb-3 shadow-sm bg-white"
                                        style="width: 170px; height: 170px; object-fit: cover; border: 4px solid #0d6efd;">
                                    <div>
                                        <button id="btnChangePhoto"
                                            class="btn btn-sm btn-outline-primary px-3 fw-bold">Change Photo</button>
                                        <input type="file" id="avatarUpload" accept="image/*" class="d-none">
                                    </div>
                                </div>

                                <div class="col-md-7 ps-md-4">
                                    <div id="profileMessage" class="text-center mb-3 fw-bold"></div>

                                    <div class="table-responsive">
                                        <table class="table table-hover mb-0">
                                            <tbody>
                                                <tr>
                                                    <th scope="row" class="w-25 text-muted align-middle">Full Name</th>
                                                    <td><input type="text" id="profName"
                                                            class="form-control form-control-sm"></td>
                                                </tr>
                                                <tr>
                                                    <th scope="row" class="text-muted align-middle">Email</th>
                                                    <td class="align-middle fw-medium" id="profEmail">user@example.com
                                                    </td>
                                                </tr>
                                                <tr>
                                                    <th scope="row" class="text-muted align-middle">Gender</th>
                                                    <td>
                                                        <select id="profGender" class="form-select form-select-sm">
                                                            <option value="male">Male</option>
                                                            <option value="female">Female</option>
                                                            <option value="other">Other</option>
                                                        </select>
                                                    </td>
                                                </tr>
                                                <tr>
                                                    <th scope="row" class="text-muted align-middle">Birth Date</th>
                                                    <td><input type="date" id="profDate"
                                                            class="form-control form-control-sm"></td>
                                                </tr>
                                                <tr>
                                                    <th scope="row" class="text-muted align-middle">Password</th>
                                                    <td><input type="text" id="profPass"
                                                            class="form-control form-control-sm"></td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                    <div class="mt-4 text-end">
                                        <button id="btnSaveProfile" class="btn btn-primary px-4 fw-bold">Save
                                            Changes</button>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-primary py-4 mt-auto text-white-50">
        <div class="container text-center text-md-start">
            <div class="row align-items-center">
                <div class="col-md-4 mb-3 mb-md-0">
                    <h5 class="text-white fw-bold">DevCalc &copy; 2026</h5>
                    <small>Educational Web Design Project</small>
                </div>
                <div class="col-md-4 mb-3 mb-md-0 text-center">
                    <strong class="text-white">Privacy Note:</strong><br>
                    <small>This is an educational prototype. No real personal data is stored or processed.</small>
                </div>
                <div class="col-md-4 text-md-end">
                    <p class="mb-0 text-white">Designed for KPI Laboratory Work</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="lib/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/profile.js"></script>
    <script type="module" src="js/navbar.js"></script>
</body>

</html>
