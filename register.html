<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account - DevCalc</title>
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/x-icon" href="images/favicon.png" />
</head>

<body class="d-flex flex-column min-vh-100">
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
            <div class="container">
                <a class="navbar-brand" href="index.html">DevCalc</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link" href="index.html">Calculator</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="flex-grow-1 container d-flex align-items-center justify-content-center py-5">
        <div class="card shadow-sm border-0" style="width: 100%; max-width: 500px;">
            <div class="card-body p-4 p-sm-5">
                <h3 class="text-center mb-4 fw-bold">Join DevCalc</h3>
                <form>
                    <div class="mb-3">
                        <label for="fullName" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="fullName" placeholder="John Doe" required>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6 mb-3 mb-md-0">
                            <label for="genderSelect" class="form-label">Gender</label>
                            <select class="form-select" id="genderSelect" required>
                                <option value="" selected disabled>Select...</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="birthDate" class="form-label">Date of Birth</label>
                            <input type="date" class="form-control" id="birthDate" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="emailReg" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="emailReg" placeholder="name@example.com" required>
                    </div>

                    <div class="mb-4">
                        <label for="passwordReg" class="form-label">Password</label>
                        <input type="password" class="form-control" id="passwordReg"
                            placeholder="Create a strong password" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Register</button>
                    <div class="text-center">
                        <span class="text-muted">Already have an account?</span> <a href="login.html"
                            class="text-decoration-none">Sign in</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-primary py-3 mt-auto text-white-50 text-center">
        <div class="container">
            <small>DevCalc &copy; 2026. Educational purpose only.</small>
        </div>
    </footer>

    <script src="lib/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
