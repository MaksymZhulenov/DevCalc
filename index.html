<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator - DevCalc</title>
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/x-icon" href="images/favicon.png" />
</head>

<body class="d-flex flex-column min-vh-100">
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
            <div class="container">
                <a class="navbar-brand" href="index.html">DevCalc</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link active" href="index.html">Calculator</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    </ul>
                    <div class="d-flex align-items-center gap-3">
                        <a href="login.html" class="text-light text-decoration-none">Login</a>
                        <a href="register.html" class="btn btn-light btn-sm fw-bold text-primary">Sign Up</a>
                        <a href="profile.html">
                            <img src="images/avatar.png" alt="Profile" class="rounded-circle"
                                style="width: 35px; height: 35px; object-fit: cover; background-color: white;">
                        </a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="flex-grow-1 d-flex align-items-center py-5">
        <div class="container d-flex justify-content-center">

            <div id="calculator" class="card shadow border-0 rounded-4 w-100 overflow-hidden"
                style="max-width: 380px; transition: max-width 0.4s ease-in-out;">
                <div class="card-body p-4">
                    <h3 class="mb-4 fw-bold text-center">Calculator</h3>

                    <div class="d-flex justify-content-center mb-3">
                        <div class="btn-group w-100" role="group">
                            <input type="radio" class="btn-check" name="calcMode" id="standard" checked>
                            <label class="btn btn-outline-primary fw-bold" for="standard">Standard</label>

                            <input type="radio" class="btn-check" name="calcMode" id="programmer">
                            <label class="btn btn-outline-primary fw-bold" for="programmer">Programmer</label>
                        </div>
                    </div>

                    <div class="calc-display border bg-light p-3 rounded-3 mb-4">
                        <div id="prog-bases"
                            class="d-none d-flex flex-column text-start small mb-2 font-monospace text-primary fw-bold"
                            style="gap: 2px;">
                            <div>HEX <span class="text-dark ms-2">0</span></div>
                            <div>DEC <span class="text-dark ms-2">0</span></div>
                            <div>OCT <span class="text-dark ms-2">0</span></div>
                            <div>BIN <span class="text-dark ms-2">0</span></div>
                        </div>

                        <div class="text-muted text-end small" style="min-height: 20px;"></div>
                        <div class="fw-bold text-dark text-end h2 mb-0" style="word-break: break-all;">0</div>
                    </div>

                    <div class="d-flex flex-wrap flex-md-nowrap gap-3 justify-content-center align-items-start">

                        <div id="prog-panel-left" class="d-none d-grid flex-shrink-0 order-2 order-md-1"
                            style="grid-template-columns: repeat(2, 1fr); gap: 8px; width: 120px;">
                            <button class="btn btn-light border w-100 calc-btn fw-bold">A</button>
                            <button class="btn btn-light border w-100 calc-btn fw-bold">B</button>
                            <button class="btn btn-light border w-100 calc-btn fw-bold">C</button>
                            <button class="btn btn-light border w-100 calc-btn fw-bold">D</button>
                            <button class="btn btn-light border w-100 calc-btn fw-bold">E</button>
                            <button class="btn btn-light border w-100 calc-btn fw-bold">F</button>
                        </div>

                        <div class="flex-grow-1 order-1 order-md-2" style="min-width: 250px; max-width: 320px;">
                            <div class="row g-2">
                                <div class="col-3"><button class="btn btn-danger w-100 calc-btn fw-bold">C</button>
                                </div>
                                <div class="col-3"><button
                                        class="btn btn-warning text-dark w-100 calc-btn fw-bold">CE</button></div>
                                <div class="col-3"><button class="btn btn-secondary w-100 calc-btn fw-bold">%</button>
                                </div>
                                <div class="col-3"><button class="btn btn-primary w-100 calc-btn fw-bold">/</button>
                                </div>

                                <div class="col-3"><button
                                        class="btn btn-light border w-100 calc-btn fw-bold">7</button></div>
                                <div class="col-3"><button
                                        class="btn btn-light border w-100 calc-btn fw-bold">8</button></div>
                                <div class="col-3"><button
                                        class="btn btn-light border w-100 calc-btn fw-bold">9</button></div>
                                <div class="col-3"><button class="btn btn-primary w-100 calc-btn fw-bold">*</button>
                                </div>

                                <div class="col-3"><button
                                        class="btn btn-light border w-100 calc-btn fw-bold">4</button></div>
                                <div class="col-3"><button
                                        class="btn btn-light border w-100 calc-btn fw-bold">5</button></div>
                                <div class="col-3"><button
                                        class="btn btn-light border w-100 calc-btn fw-bold">6</button></div>
                                <div class="col-3"><button class="btn btn-primary w-100 calc-btn fw-bold">-</button>
                                </div>

                                <div class="col-3"><button
                                        class="btn btn-light border w-100 calc-btn fw-bold">1</button></div>
                                <div class="col-3"><button
                                        class="btn btn-light border w-100 calc-btn fw-bold">2</button></div>
                                <div class="col-3"><button
                                        class="btn btn-light border w-100 calc-btn fw-bold">3</button></div>
                                <div class="col-3"><button class="btn btn-primary w-100 calc-btn fw-bold">+</button>
                                </div>

                                <div class="col-6"><button
                                        class="btn btn-light border w-100 calc-btn fw-bold">0</button></div>
                                <div class="col-3"><button
                                        class="btn btn-light border w-100 calc-btn fw-bold">.</button></div>
                                <div class="col-3"><button class="btn btn-success w-100 calc-btn fw-bold">=</button>
                                </div>
                            </div>
                        </div>

                        <div id="prog-panel-right" class="d-none d-grid flex-shrink-0 order-3 order-md-3"
                            style="grid-template-columns: repeat(2, 1fr); gap: 8px; width: 120px;">
                            <button class="btn btn-outline-primary w-100 calc-btn fw-bold">AND</button>
                            <button class="btn btn-outline-primary w-100 calc-btn fw-bold">OR</button>
                            <button class="btn btn-outline-primary w-100 calc-btn fw-bold">XOR</button>
                            <button class="btn btn-outline-primary w-100 calc-btn fw-bold">NOT</button>
                            <button class="btn btn-outline-primary w-100 calc-btn fw-bold">&lt;&lt;</button>
                            <button class="btn btn-outline-primary w-100 calc-btn fw-bold">&gt;&gt;</button>
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="bg-primary py-4 mt-auto text-white-50">
        <div class="container text-center text-md-start">
            <div class="row align-items-center">
                <div class="col-md-4 mb-3 mb-md-0">
                    <h5 class="text-white fw-bold">DevCalc &copy; 2026</h5>
                    <small>Educational Web Design Project</small>
                </div>
                <div class="col-md-4 mb-3 mb-md-0 text-center">
                    <strong class="text-white">Privacy Note:</strong><br>
                    <small>This is an educational prototype. No real personal data is stored or processed.</small>
                </div>
                <div class="col-md-4 text-md-end">
                    <p class="mb-0 text-white">Designed for KPI Laboratory Work</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="lib/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/calculator.js"></script>
    <script type="module" src="js/navbar.js"></script>
</body>

</html>
